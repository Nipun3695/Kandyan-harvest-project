<div class="panel-card">
  <h2>Marketplace</h2>
  <div class="market-filter-bar">
    <div class="filter-group">
      <label for="filterCategory">Category</label>
      <select id="filterCategory">
        <option value="all">All Categories</option>
        <option value="Vegetable">Vegetable</option>
        <option value="Fruit">Fruit</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="filterVariety">Variety</label>
      <select id="filterVariety">
        <option value="all">All Varieties</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="filterDistrict">District</label>
      <select id="filterDistrict">
        <option value="all">All Districts</option>
      </select>
    </div>

    <div class="filter-group">
      <label for="filterDate">Date Added</label>
      <select id="filterDate">
        <option value="anytime">Anytime</option>
        <option value="today">Today</option>
        <option value="this_week">This Week</option>
      </select>
    </div>
  </div>

  <div id="marketplaceList"></div>
</div>
